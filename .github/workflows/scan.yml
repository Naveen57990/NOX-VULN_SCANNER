name: Vulnerability Scanner
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        type: string
      scan_type:
        description: 'Type of scan'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - recon
          - web
          - directories
          - fuzzing
          - subdomains
          - exploitation
jobs:
  scan:
    name: Run Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: false
          load: true
          tags: vuln-scanner:latest
      
      - name: Run vulnerability scan
        run: |
          mkdir -p output
          docker run --rm \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e AI_PROVIDER="openai" \
            -v ${{ github.workspace }}/output:/app/output \
            -w /app \
            vuln-scanner:latest \
            /bin/bash -c "python3 main.py --url '${{ inputs.target_url }}' --scan-type '${{ inputs.scan_type }}' --output /app/output"
      
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: scan-reports
          path: output/
          retention-days: 30
